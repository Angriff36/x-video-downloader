name: Nightly backend redeploy (refresh yt-dlp)

# Why this exists:
# yt-dlp is baked into the Fly.io container at build time. Sites (X, YouTube,
# TikTok, etc.) change constantly and yt-dlp ships extractor fixes almost daily,
# but the live server never sees them until the image is rebuilt. This job
# rebuilds + redeploys every night with the latest yt-dlp master, so downloads
# keep working without manual redeploys.

on:
  schedule:
    # 09:00 UTC = ~01:00-02:00 in Seattle (the app's primary_region "sea").
    # Low-traffic hours; runs every night.
    - cron: "0 9 * * *"
  workflow_dispatch: {} # adds a manual "Run workflow" button in the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy with fresh yt-dlp
        working-directory: "fly.io backend"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        # --remote-only  -> build on Fly's builders (no local Docker needed)
        # --build-arg    -> unique value busts ONLY the yt-dlp cache layer,
        #                   forcing a fresh pull of yt-dlp master each run.
        run: |
          flyctl deploy \
            --remote-only \
            --build-arg YTDLP_REFRESH="${GITHUB_RUN_ID}-${GITHUB_RUN_NUMBER}"
